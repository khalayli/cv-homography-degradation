run:
  name: "dev_run"
  seed: 123
  out_dir: "results/dev_run"

# Keep HPatches root local/Drive-specific. Do not commit datasets.
dataset:
  name: "hpatches"
  hpatches_root: "/content/data/hpatches/hpatches-sequences-release"
  pairs_per_scene: 5

corruptions:
  enabled: true
  mode: "single"          # single | sequence
  include_clean: true
  apply_to: "target"      # source | target | both
  types:
    - "gaussian_blur"
    - "motion_blur"
    - "gaussian_noise"
    - "jpeg_compression"
    - "brightness"
    - "contrast"
  severities: [0, 1, 2, 3, 4]

method:
  name: "proposed" # orb / xfeat / proposed

  orb:
    nfeatures: 2000
    scaleFactor: 1.2
    nlevels: 8
    fastThreshold: 20
    ratio_test: 0.80

  xfeat:
    device: "cpu"
    top_k: 1024
    weights_path: null
    score_threshold: null

  proposed:
    enabled: true
    adaptive_thresholds: true
    fallback_enabled: true

    primary_matcher: "xfeat"
    fallback_matcher: "orb"

    min_matches_before_fallback: 20
    max_adaptive_min_matches: 60

    blur_low_threshold: 60.0
    noise_high_threshold: 12.0
    contrast_low_threshold: 25.0
    jpeg_high_threshold: 2.0
    noise_flat_grad_threshold: 12.0

    brightness_low_threshold: 45.0
    brightness_high_threshold: 245.0
    dynamic_range_low_threshold: 55.0

    fallback_min_spatial_coverage: 0.015
    fallback_min_score_mean: 0.20

    reproj_threshold_nominal: 3.0
    reproj_threshold_hard: 4.0
    reproj_threshold_very_hard: 5.0

    probe_reproj_threshold: 3.0
    probe_confidence: 0.995
    probe_max_iters: 2000

    probe_min_inliers: 40
    probe_min_inlier_ratio: 0.50
    probe_min_inlier_coverage: 0.04

    probe_min_area_ratio: 0.20
    probe_max_area_ratio: 4.00
    probe_margin_ratio: 0.25

geom:
  reproj_threshold: 3.0
  confidence: 0.999
  max_iters: 5000

eval:
  corner_error_thresholds: [1, 3, 5, 10]

