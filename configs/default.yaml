run:
  name: "dev_run"
  seed: 123
  out_dir: "results/dev_run"

# Keep HPatches root local/Drive-specific. Do not commit datasets.
dataset:
  name: "hpatches"
  hpatches_root: "/content/data/hpatches/hpatches-sequences-release"
  pairs_per_scene: 5

corruptions:
  enabled: true
  mode: "single"          # single | sequence
  include_clean: true
  apply_to: "target"      # source | target | both
  types:
    - "gaussian_blur"
    - "motion_blur"
    - "gaussian_noise"
    - "jpeg_compression"
    - "brightness"
    - "contrast"
  severities: [0, 1, 2, 3, 4]

method:
  name: "proposed" # orb / xfeat / proposed

  orb:
    nfeatures: 2000
    scaleFactor: 1.2
    nlevels: 8
    fastThreshold: 20
    ratio_test: 0.75

  xfeat:
    device: "cpu"
    top_k: 2000
    weights_path: null
    score_threshold: null

  proposed:
    enabled: true
    adaptive_thresholds: true
    fallback_enabled: true
    primary_matcher: "xfeat"
    fallback_matcher: "orb"
    min_matches_before_fallback: 30

geom:
  reproj_threshold: 3.0
  confidence: 0.999
  max_iters: 5000

eval:
  corner_error_thresholds: [1, 3, 5, 10]

